# pcid binding for the VirtIO entropy device. Installed (by the base Makefile)
# as /usr/lib/pcid.d/virtio-rngd.toml. QEMU's `-device virtio-rng-pci` is the
# transitional device 1af4:1005.
#
# We match on vendor:device only. pcid's `class` filter is optional
# (DriverConfig.class is Option<u8>, applied only when present — see
# drivers/pcid/src/driver_interface/config.rs), and QEMU reports virtio-rng
# under PCI class "other" (0xff) rather than a dedicated class, so pinning a
# class would be fragile. The transitional ID 1af4:1005 is unambiguous.
[[drivers]]
name = "virtio-rng"
vendor = 0x1AF4
device = 0x1005
command = ["virtio-rngd"]
