# E-OS: re-enabled USB mass storage (was disabled upstream "until more reliable";
# the reported xHCI errors appear hardware-specific -- re-enabling for QEMU/common HW).
[[drivers]]
name = "SCSI over USB"
class = 8 # Mass Storage class
subclass = 6 # SCSI transparent command set
command = ["usbscsid", "$SCHEME", "$PORT", "$IF_PROTO"]

[[drivers]]
name = "USB HUB"
class = 9 # HUB class
subclass = -1
command = ["usbhubd", "$SCHEME", "$PORT", "$IF_NUM"]

[[drivers]]
name = "USB HID"
class = 3 # HID class
subclass = -1
command = ["usbhidd", "$SCHEME", "$PORT", "$IF_NUM"]

[[drivers]]
name = "USB HID Xbox 360"
class = 255 # Vendor specific class
subclass = 93
protocol = 1
ids = { 0x045e = [
    0x028e # Xbox 360 controller
] }
command = ["usbhidd", "$SCHEME", "$PORT", "$IF_NUM", "xbox-360"]
